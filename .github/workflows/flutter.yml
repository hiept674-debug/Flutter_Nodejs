name: Flutter CI

on:
  push:
    branches:
      - main

jobs:
  flutter-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hello_world

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"

      - name: Check Version
        run: flutter --version

      - name: Install Packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze || true

      - name: Test
        run: flutter test
